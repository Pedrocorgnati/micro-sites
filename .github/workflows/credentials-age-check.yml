# credentials-age-check.yml (CL-480)
# Cron mensal — abre issue se algum token rotated >12m.
name: Credentials Age Check

on:
  schedule:
    - cron: '0 9 1 * *' # 1o de cada mes 09:00 UTC
  workflow_dispatch:

jobs:
  check:
    name: Check credentials age
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run age check
        id: age
        continue-on-error: true
        run: npx tsx scripts/list-credentials-age.ts | tee credentials-age-report.txt

      - name: Open issue if expired
        if: steps.age.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('credentials-age-report.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[credentials-age] Tokens vencidos — ${new Date().toISOString().slice(0,10)}`,
              body: `Detectados tokens com idade >365d.\n\n\`\`\`\n${body}\n\`\`\`\n\nVer \`docs/operations/TOKEN-ROTATION-RUNBOOK.md\`.`,
              labels: ['security', 'credentials-rotation'],
            });
