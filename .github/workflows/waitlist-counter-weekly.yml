name: Waitlist Counter Weekly

# TASK-24 ST002 / CL-208 — atualiza waitlist.count em sites/e*/config.json semanalmente.

on:
  schedule:
    - cron: '0 6 * * MON'   # toda segunda 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'manual | sf-api | local'
        required: false
        default: 'manual'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install deps
        run: npm ci

      - name: Update waitlist counts
        env:
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
        run: npx tsx scripts/update-waitlist-counter.ts --mode=${{ inputs.mode || 'manual' }}

      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(waitlist): update counters ${{ github.run_id }}'
          title: 'chore(waitlist): weekly counter update'
          body: |
            ## Waitlist counters update

            Atualizacao automatica de `sites/e*/config.json` campo `waitlist.count`.

            Mode usado: `${{ inputs.mode || 'manual' }}`

            Conferir diff antes de fazer merge — counters nao devem regredir
            sem motivo. Quedas suspeitas podem indicar erro de API ou opt-out
            em massa que merece investigacao.
          branch: waitlist/counter-${{ github.run_id }}
          delete-branch: true
          labels: |
            automation
            waitlist
