name: Static Forms — Monthly Purge (24m retention)

on:
  schedule:
    - cron: '0 5 1 * *'   # mensal — dia 1 as 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run SF purge (24m)
        id: purge
        env:
          SF_API_TOKEN: ${{ secrets.SF_API_TOKEN }}
          SF_RETENTION_MONTHS: ${{ vars.SF_RETENTION_MONTHS || '24' }}
        run: |
          set +e
          npx tsx scripts/sf-purge-24m.ts
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Open PR with purge log
        if: steps.purge.outputs.code != '2'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(lgpd): SF purge mensal $(date -u +%Y-%m-%d)"
          title: "[lgpd] SF purge mensal $(date -u +%Y-%m-%d)"
          body: |
            Purge automatico de submissions Static Forms com >24 meses (CL-622, ROPA item 1-3).

            Logs em `logs/sf-purge-*.json`. CSV manual em `logs/sf-purge-manual-*.csv` (se houver).

            Acoes humanas: vide PENDING-ACTIONS.md `lgpd-2026-04`.
          branch: lgpd/sf-purge-${{ github.run_id }}
          add-paths: |
            logs/sf-purge-*.json
            logs/sf-purge-manual-*.csv
          labels: lgpd,automated
