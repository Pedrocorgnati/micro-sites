name: Monitoring Snapshot Monthly

# TASK-22 ST003 / CL-278 — exporta UptimeRobot monitors para config commitado.

on:
  schedule:
    - cron: '0 7 1 * *'   # dia 1 de cada mes 07:00 UTC
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install deps
        run: npm ci

      - name: Export monitoring config
        env:
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
        run: npx tsx scripts/export-monitoring-config.ts

      - name: Open PR with snapshot diff
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(monitoring): monthly snapshot ${{ github.run_id }}'
          title: 'chore(monitoring): monthly UptimeRobot snapshot'
          body: |
            ## Monitoring Snapshot

            Exportacao mensal de `config/monitoring-snapshot.json`.

            Conferir diff:
            - Monitors adicionados (deveria casar com sites novos da rede)
            - Monitors removidos (cuidado — pode ser deletion acidental)
            - Mudancas de threshold/interval (deveria ser intencional)

            Acoes se diff suspeito:
            - Reverter via UptimeRobot dashboard
            - Re-rodar workflow manualmente apos correcao
          branch: monitoring/snapshot-${{ github.run_id }}
          delete-branch: true
          labels: |
            automation
            monitoring
