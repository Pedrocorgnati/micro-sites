name: GSC Monthly Audit

# TASK-14 ST003 — auditoria mensal de propriedades GSC
# Roda dia 1 do mes 09:00 UTC, abre PR com gsc-properties-status.md atualizado.

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      run_bulk_verify:
        description: 'Tambem rodar bulk-verify (caro — so se houver pendentes)?'
        required: false
        type: boolean
        default: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install deps
        run: npm ci

      - name: Decode GSC service account
        env:
          GSC_SA_BASE64: ${{ secrets.GSC_SERVICE_ACCOUNT_BASE64 }}
        run: |
          if [ -z "$GSC_SA_BASE64" ]; then
            echo "::warning::GSC_SERVICE_ACCOUNT_BASE64 ausente — script ira pular GSC API"
            mkdir -p secrets
            echo '{}' > secrets/gsc-service-account.json
          else
            mkdir -p secrets
            echo "$GSC_SA_BASE64" | base64 -d > secrets/gsc-service-account.json
          fi

      - name: Generate properties checklist
        env:
          GSC_CREDENTIALS: secrets/gsc-service-account.json
        run: npx tsx scripts/gsc-properties-checklist.ts

      - name: Run bulk verify (optional)
        if: ${{ inputs.run_bulk_verify == true }}
        env:
          GSC_CREDENTIALS: secrets/gsc-service-account.json
          DNS_PROVIDER: ${{ vars.DNS_PROVIDER || 'cloudflare' }}
          DNS_API_TOKEN: ${{ secrets.DNS_API_TOKEN }}
        run: |
          npx tsx scripts/gsc-bulk-verify.ts || echo "::warning::bulk-verify retornou erro (esperado se DNS provider sem API)"

      - name: Cleanup secrets
        if: always()
        run: rm -f secrets/gsc-service-account.json

      - name: Open PR with updated report
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(gsc): monthly properties audit ${{ github.run_id }}'
          title: 'chore(gsc): monthly properties audit'
          body: |
            ## GSC Monthly Audit

            Relatorio automatico gerado por `scripts/gsc-properties-checklist.ts`.

            Conferir:
            - `output/reports/gsc-properties-status.md`
            - `output/reports/gsc-properties-status.json`

            Acao se houver pendentes:
            - Re-rodar bulk-verify manualmente: `gh workflow run gsc-monthly-audit.yml -f run_bulk_verify=true`
          branch: gsc/monthly-audit-${{ github.run_id }}
          delete-branch: true
          labels: |
            automation
            gsc
