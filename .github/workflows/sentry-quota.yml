name: Sentry Quota Watch

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:

jobs:
  quota:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sentry quota check
        id: quota
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_QUOTA: ${{ vars.SENTRY_QUOTA }}
        run: |
          set +e
          npx tsx scripts/sentry-quota-check.ts --json | tee quota.json
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Open issue on warn/crit
        if: steps.quota.outputs.exit_code != '0' && steps.quota.outputs.exit_code != '3'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('quota.json', 'utf8'));
            const title = `[sentry-quota] ${data.status.toUpperCase()} — ${data.ratio * 100}% da quota`;
            const body = `Quota Sentry mensal acima do threshold.\n\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\`\n\nRunbook: docs/operations/SENTRY-ROTATION-RUNBOOK.md`;
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['alert', 'sentry'] });
