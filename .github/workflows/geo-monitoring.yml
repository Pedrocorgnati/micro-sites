name: GEO Monitoring (AI Overviews + ChatGPT + Perplexity)

on:
  schedule:
    - cron: '0 8 1 * *'   # mensal — dia 1 as 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  geo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Perplexity
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: npx tsx scripts/geo-monitor-perplexity.ts --all || true

      - name: ChatGPT (web search)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/geo-monitor-chatgpt.ts --all || true

      - name: Google AI Overviews via Tavily
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/geo-monitor-google-ai-overviews.ts --all || true

      - name: Aggregate report
        run: npx tsx scripts/geo-aggregate-report.ts

      - name: Open PR with monthly report
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(geo): monthly report $(date -u +%Y-%m)"
          title: "[geo] Monthly report $(date -u +%Y-%m)"
          body: |
            Relatorio mensal de presenca em motores generativos (Google AI Overviews + ChatGPT + Perplexity).

            Vide `output/reports/geo/${{ github.run_number }}/<YYYY-MM>.md`.
            Runbook: `docs/seo/GEO-MONITORING-RUNBOOK.md`.
          branch: geo/${{ github.run_id }}
          add-paths: |
            output/reports/geo/*
          labels: geo,monthly
