name: Synthetic Monitors + Alert Watch

on:
  schedule:
    - cron: '0 6 * * *'   # diario 06:00 UTC — sinteticos SF + WA
    - cron: '0 7 * * 1'   # segunda 07:00 UTC — comparativos w/w
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  synthetic-daily:
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Synthetic Static Forms
        id: sf
        env:
          SF_ACCESS_KEY: ${{ secrets.SF_ACCESS_KEY }}
          FORMS_ENDPOINT_FALLBACK_URL: ${{ vars.FORMS_ENDPOINT_FALLBACK_URL }}
        run: |
          set +e
          npx tsx scripts/synthetic-static-forms.ts
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Synthetic WhatsApp deep links
        id: wa
        run: |
          set +e
          npx tsx scripts/synthetic-whatsapp-link.ts | tee wa.json
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: steps.sf.outputs.code != '0' || steps.wa.outputs.code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Synthetic monitor failure',
              `- Static Forms exit: ${{ steps.sf.outputs.code }}`,
              `- WhatsApp exit: ${{ steps.wa.outputs.code }}`,
              '',
              'Runbook: docs/operations/SF-QUOTA-ESCALATION-RUNBOOK.md',
              'Alert rules: config/alert-rules.json',
            ].join('\n');
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: '[synthetic] Monitor failure', body, labels: ['alert', 'synthetic'] });

  comparative-weekly:
    if: github.event.schedule == '0 7 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Submission drop alert
        id: subdrop
        run: |
          set +e
          npx tsx scripts/alert-submission-drop.ts | tee subdrop.json
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Calc completion drop alert
        id: calcdrop
        run: |
          set +e
          npx tsx scripts/alert-calc-completion.ts | tee calcdrop.json
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: GSC indexing watch
        id: gsc
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          set +e
          npx tsx scripts/gsc-indexing-watch.ts | tee gsc.json
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit snapshots
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add .cache/submission-snapshots .cache/calc-completion-snapshots .cache/gsc-indexing-snapshots 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore(monitors): snapshot $(date -u +%Y-%m-%d)"
          git push || true

      - name: Open issue when drops detected
        if: steps.subdrop.outputs.code == '1' || steps.calcdrop.outputs.code == '1' || steps.gsc.outputs.code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reports = ['subdrop.json', 'calcdrop.json', 'gsc.json'].map((f) => {
              try { return `\n#### ${f}\n\n\`\`\`json\n${fs.readFileSync(f, 'utf8')}\n\`\`\``; }
              catch { return ''; }
            }).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[alert-watch] Drops detected — ${new Date().toISOString().slice(0,10)}`,
              body: `Comparative weekly checks detectaram quedas significantes.\n${reports}\n\nAlert rules: config/alert-rules.json`,
              labels: ['alert', 'comparative'],
            });
