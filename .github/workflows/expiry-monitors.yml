# expiry-monitors.yml (CL-630)
# Cron diario — abre issue se SSL ou DNS proximos do vencimento.
name: Expiry Monitors (SSL + DNS)

on:
  schedule:
    - cron: '0 8 * * *' # diario 08:00 UTC
  workflow_dispatch:

jobs:
  ssl-check:
    name: SSL expiry check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Run SSL watch
        id: ssl
        continue-on-error: true
        run: npx tsx scripts/ssl-expiry-watch.ts | tee ssl-expiry-report.txt

      - name: Open issue if expiring
        if: steps.ssl.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ssl-expiry-report.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ssl-watch] Certs expirando — ${new Date().toISOString().slice(0,10)}`,
              body: `Detectados certs SSL <30d.\n\n\`\`\`\n${body}\n\`\`\``,
              labels: ['security', 'ssl-expiry'],
            });

  dns-check:
    name: DNS expiry check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install whois cli
        run: sudo apt-get update -qq && sudo apt-get install -y -qq whois

      - name: Install
        run: npm ci

      - name: Run DNS watch
        id: dns
        continue-on-error: true
        env:
          WHOIS_DOMAINS: ${{ vars.WHOIS_DOMAINS }}
        run: npx tsx scripts/dns-expiry-watch.ts | tee dns-expiry-report.txt

      - name: Open issue if expiring
        if: steps.dns.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('dns-expiry-report.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[dns-watch] Dominios vencendo — ${new Date().toISOString().slice(0,10)}`,
              body: `Dominios com vencimento <60d.\n\n\`\`\`\n${body}\n\`\`\``,
              labels: ['security', 'dns-expiry'],
            });
