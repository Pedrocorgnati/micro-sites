# ============================================================
# nginx.conf — micro-sites (Static Export)
# Serve arquivos estáticos gerados pelo Next.js output: 'export'
# trailingSlash: true → /sobre/ mapeia para /sobre/index.html
# ============================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Headers de segurança
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache longo para assets com hash (Next.js os versionaautomaticamente)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Roteamento SPA com trailing slash (trailingSlash: true no Next.js)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Página de erro customizada (se existir no build)
    error_page 404 /404/index.html;
}
