# ============================================================
# nginx.conf — micro-sites (Static Export)
# Serve arquivos estáticos gerados pelo Next.js output: 'export'
# trailingSlash: true → /sobre/ mapeia para /sobre/index.html
# ============================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ── Headers de segurança base ────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── ADS-19 — Content-Security-Policy (AdSense whitelist) ─
    # DEC-01: CSP só em nginx (static export não suporta next.config.headers).
    # 'unsafe-inline' em script-src é necessário pela NPA flag injetada em
    # layout.tsx (INV-ADS-11). Backlog: externalizar para 1st-party + nonce.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://*.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.googlesyndication.com https://*.doubleclick.net https://*.googleadservices.com https://*.google.com https://www.google-analytics.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://*.googlesyndication.com https://www.google.com; fenced-frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://*.googlesyndication.com; connect-src 'self' https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.doubleclick.net https://www.google-analytics.com https://api.staticforms.xyz; font-src 'self' https://fonts.gstatic.com data:; base-uri 'self'; object-src 'none'; form-action 'self' https://api.staticforms.xyz" always;

    # ── ADS-19 — Permissions-Policy (Privacy Sandbox APIs) ───
    # AdSense usa Topics API e attribution-reporting; libera só self.
    # interest-cohort = () bloqueia FLoC (deprecated mas defensivo).
    add_header Permissions-Policy "browsing-topics=(self), interest-cohort=(), attribution-reporting=(self), join-ad-interest-group=(self), run-ad-auction=(self)" always;

    # ── ADS-43 — ads.txt sem cache agressivo (Google revalida diariamente) ─
    location = /ads.txt {
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files /ads.txt =404;
    }

    # Cache longo para assets com hash (Next.js os versiona automaticamente)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Roteamento SPA com trailing slash (trailingSlash: true no Next.js)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Página de erro customizada (se existir no build)
    error_page 404 /404/index.html;
}
